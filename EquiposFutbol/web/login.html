<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 shrink-to-fit=no">
    <title>Login</title>
    <link rel="icon" href="./images/favicon.ico"><link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/font-awesome.min.css">
    <script src="/js/libs/bootstrap.min.js"></script>
    <script src="./js/libs/axios.min.js"></script>
    <script src="/js/utils/include.js"></script>
    <script src="./js/login.js" type="module"></script>
</head>
<body>

    <div id="page-header">

    </div>

    <div class="mx-5">

        <h3 class="text-center mt-3">Login</h3>

        <hr>

        <form id="form-login">
            <div class="row">
                <div class="form-group col-md">
                    <label for="input-username">Username:</label>
                    <input requiered type="text" class="form-control" id="input-username" name="username" placeholder="Username">
                </div>
                <div class="form-group col-md">
                    <label for="input-password">Password:</label>
                    <input required type="password" class="form-control" id="input-password" name="password" placeholder="Password">
                </div>
            </div>
            <div class="row text-center">
                <div class="col-md mt-4">
                    <button type="submit" class="btn btn-primary">
                        Login
                    </button>
                </div>

            </div>
        </form>

    </div>

    <script>
        include("header.html","#page-header");
    </script>
    
</body>
</html>
