<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="images/favicon.ico">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">

    <script src="js/libs/bootstrap.min.js"></script>
    <script src="js/libs/axios.min.js"></script>
    <script src="js/utils/include.js"></script>

    <script src="./js/header.js" type="module"></script>
    <script src="/web/js/validators/register.js" type="module"></script>
    <title>Register</title>
</head>
<body>

    <div id="page-header"></div>

    <div id="erros">

    </div>

    <div class="container card border-2 border-dark rounded">
        <div class="row">
            <div class="col-md text-center">
                <h3>Register</h3>
            </div>
        </div>

        <hr>

        <form id="register-form">
            <div class="row">
                <div class="col-md mb-3">
                    <labe for="fullname-input">Full Name:</labe>
                    <input type="text" class="form-control" id="fullname-input" name="fullName" placeholder="FullName" required>
                </div>
                <div class="col-md mb-3">
                    <label for="username-input">Username:</label>
                    <input type="text" class="form-control" id="username-input" name="username" placeholder="Username" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md mb-3">
                    <label for="password-input">Password:</label>
                    <input type="password" class="form-control" id="password-input" name="password" placeholder="Password" required>
                </div>
                <div class="col-md mb-3">
                    <label for="password2-input">Repeat Password:</label>
                    <input type="password" class="form-control" id="password2-input" name="password2" placeholder="Repeat your password" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md text-center">
                    <button type="submit" class="btn btn-primary mb-2">
                        Registrarse
                    </button>
                </div>
            </div>
        </form>

    </div>

    <script>
        include("header.html","#page-header");
    </script>
    
</body>
</html>
