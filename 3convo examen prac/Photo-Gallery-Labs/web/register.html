<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/font-awesome.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/libs/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/register.js" type="module"></script>
    <script src="/js/utils/include.js"></script>
    <script src="/js/header.js" type="module"></script>
    <script src="./js/libs/axios.min.js"></script>
    <title>Register</title>
</head>
<div id="page-header">

</div>
<body class="dark">
    <div class="container">
        <div class="row text-center">
            <div class="col-md-">
                <h1>Register a new user</h1>
            </div>
        </div>
    </div>
    <div class="container">
        <form id="register-form">
            <aside class= "row">
                <div id="errors" class="form-group col-sm"></div>
            </aside>
            <div class="row">
                <div class="col-md">
                    <div class="form-group">
                        <label for="firstname-input">First name:</label>
                        <input type="text" class="form-control text-light bg-dark" id="firstname-input" name="firstName" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label for="email-input">Email:</label>
                        <input type="text" class="form-control text-light bg-dark" id="email-input" name="email" placeholder="Email" required>
                    </div>
                </div>
                <div class="col-md">
                    <div class="form-group">
                        <label for="lastname-input">Last name:</label>
                        <input type="text" class="form-control text-light bg-dark" id="lastname-input" name="lastName" placeholder="Last name" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber-input">Phone number:</label>
                        <input type="number" class="form-control text-light bg-dark" id="phoneNumber-input" name="telephone" placeholder="Phone Number" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md">
                        <div class="form-group">
                            <label for="Username-input">Username:</label>
                            <input type="text" class="form-control text-light bg-dark" id="Username-input" name="username" placeholder="Username" required>
                        </div>
                    </div>
                    <div class="col-md">
                        <div class="form-group">
                            <label for="password-input">Password:</label>
                            <input type="password" class="form-control text-light bg-dark" id="password-input" name="password" placeholder="Password" required>
                        </div>
                    </div>
                    <div class="col-md">
                        <div class="form-group">
                            <label for="password2-input">Repeat password:</label>
                            <input type="password" class="form-control text-light bg-dark" id="password2-input" name="password2" placeholder="Repeat password" required>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <div class="row" id="botones2">
            <div class="col-md text-center">
                <button type="submit" class="btn btn-primary" id="register-button">
                    <i class="fa fa-user-plus"></i>Register</button>
                <a href="index.html" class="btn btn-primary">Return</a>
            </div>
        </div>
    </div>

   <script>
        include("header.html","#page-header");
   </script> 
</body>
</html>
